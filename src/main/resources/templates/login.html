<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artopia · Masuk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}">Artopia<span class="brand-dot"></span></a>
    <ul class="nav-links">
    <li><a th:href="@{/}">Home</a></li>
    <li><a th:href="@{/katalog}">Katalog</a></li>
    </ul>
</nav>

<div class="container flex-center" style="min-height: 80vh; padding: 2rem 0;">
    
    <div class="panel" style="width: 100%; max-width: 420px; padding: 2.5rem;">
    
    <div class="text-center mb-4">
        <h1 style="color: var(--navy); margin-bottom: 0.5rem;">Selamat Datang</h1>
        <p class="text-muted">Masuk ke akun Artopia Anda</p>
    </div>

    <div th:if="${error}" class="alert alert-danger text-center" style="font-size: 0.85rem; padding: 0.6rem; border-radius: var(--radius);">
        <span th:text="${error}">Username atau password salah!</span>
    </div>
    
    <div th:if="${success}" class="alert alert-success text-center" style="font-size: 0.85rem; padding: 0.6rem; border-radius: var(--radius);">
        <span th:text="${success}">Berhasil!</span>
    </div>

    <form th:action="@{/login}" method="post">
        
        <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Masukkan username" required autofocus>
        </div>
        
        <div class="form-group mt-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Masukkan password" required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-full mt-3" style="padding: 0.6rem;">Masuk</button>
        
    </form>

    <div class="text-center mt-4" style="font-size: 0.85rem; color: var(--text-muted);">
        Belum memiliki akun? <a th:href="@{/register}" style="color: var(--navy); font-weight: 600;">Daftar di sini</a>
    </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
