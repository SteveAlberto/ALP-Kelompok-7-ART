<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artopia · Daftar Akun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}">Artopia<span class="brand-dot"></span></a>
    <ul class="nav-links">
        <li><a th:href="@{/}">Home</a></li>
        <li><a th:href="@{/katalog}">Katalog</a></li>
    </ul>
</nav>

<div class="container flex-center" style="min-height: 80vh; padding: 2rem 0;">
    
    <div class="panel" style="width: 100%; max-width: 450px; padding: 2.5rem;">
    
        <div class="text-center mb-4">
            <h1 style="color: var(--navy); margin-bottom: 0.5rem; font-size: 2.2rem;">Buat Akun</h1>
            <p class="text-muted">Bergabunglah dengan ekosistem seni Artopia</p>
        </div>

        <div th:if="${error}" class="alert alert-danger text-center" style="font-size: 0.85rem; padding: 0.6rem; border-radius: var(--radius);">
            <span th:text="${error}">Pesan error akan muncul di sini!</span>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post">
            
            <div class="form-group mb-4">
                <label class="form-label" style="display:block; margin-bottom: 0.8rem;">Saya ingin mendaftar sebagai:</label>
                <div class="d-flex gap-4">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" th:field="*{role}" value="COLLECTOR" id="roleCollector" required checked>
                        <label class="form-check-label" for="roleCollector" style="font-size: 0.9rem;">
                            Kolektor (Beli Karya)
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" th:field="*{role}" value="ARTIST" id="roleArtist">
                        <label class="form-check-label" for="roleArtist" style="font-size: 0.9rem;">
                            Seniman (Jual Karya)
                        </label>
                    </div>
                </div>
            </div>
            
            <div class="form-group mb-3">
                <label class="form-label">Username</label>
                <input type="text" th:field="*{username}" class="form-control" placeholder="Pilih username unik" required autofocus>
            </div>
            
            <div class="form-group mb-3">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control" placeholder="nama@email.com" required>
            </div>
            
            <div class="form-group mb-4">
                <label class="form-label">Password</label>
                <input type="password" th:field="*{password}" class="form-control" placeholder="Minimal 6 karakter" required minlength="6">
            </div>
            
            <button type="submit" class="btn btn-primary btn-full mt-2" style="padding: 0.6rem;">Daftar Sekarang</button>
            
        </form>

        <div class="text-center mt-4" style="font-size: 0.85rem; color: var(--text-muted);">
            Sudah memiliki akun? <a th:href="@{/login}" style="color: var(--navy); font-weight: 600;">Masuk di sini</a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
