<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artopia · Edit Karya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Instrument+Sans:wght@300;400;500;600" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background-color: var(--surface);">

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}">Artopia<span class="brand-dot"></span></a>
    <ul class="nav-links">
        <li><a th:href="@{/}">Home</a></li>
        <li><a th:href="@{/katalog}">Katalog</a></li>
        <li><a th:href="@{/dashboard}" class="active">Dashboard</a></li>
        <li><a th:href="@{/inbox}">Inbox</a></li>
    </ul>
    <div class="navbar-actions" th:if="${session.loggedInUser != null}">
        <a th:href="@{/dashboard}" class="btn btn-outline btn-sm">Kembali ke Dashboard</a>
    </div>
    </nav>

    <div class="container" style="padding-top:3rem;padding-bottom:4rem; max-width: 800px;">
    
    <div class="card" style="padding: 2.5rem; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.02);">
        <div style="text-align: center; margin-bottom: 2rem;">
        <h2 style="font-family: 'Cormorant Garamond', serif; font-size: 2.2rem;">Edit Karya Seni</h2>
        <p class="text-muted">Perbarui informasi detail mengenai karya Anda di sini.</p>
        </div>

        <form th:action="@{/edit/{id}(id=${karyaEdit.id})}" th:object="${karyaEdit}" method="post">
        
        <input type="hidden" th:field="*{imageUrl}" />
        <input type="hidden" th:field="*{status}" />

        <div class="mb-4">
            <label class="form-label" style="font-weight: 600; font-size: 0.9rem;">Judul Karya</label>
            <input type="text" class="form-control" th:field="*{title}" required style="background: white;">
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-6">
            <label class="form-label" style="font-weight: 600; font-size: 0.9rem;">Kategori</label>
            <select class="form-select" th:field="*{category}" required style="background: white;">
                <option value="Lukisan">Lukisan</option>
                <option value="Digital Art">Digital Art</option>
                <option value="Patung">Patung</option>
            </select>
            </div>
            <div class="col-md-6">
            <label class="form-label" style="font-weight: 600; font-size: 0.9rem;">Tingkat Kesulitan</label>
            <select class="form-select" th:field="*{difficulty}" required style="background: white;">
                <option value="BASIC">Basic</option>
                <option value="INTERMEDIATE">Intermediate</option>
                <option value="ADVANCED">Advanced</option>
            </select>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-6">
            <label class="form-label" style="font-weight: 600; font-size: 0.9rem;">Jam Kerja (Durasi Pembuatan)</label>
            <div class="input-group">
                <input type="number" class="form-control" th:field="*{workHours}" required min="1" style="background: white;">
                <span class="input-group-text" style="background: var(--surface); border-color: var(--border);">Jam</span>
            </div>
            </div>
            <div class="col-md-6">
            <label class="form-label" style="font-weight: 600; font-size: 0.9rem;">Biaya Produksi (Rp)</label>
            <div class="input-group">
                <span class="input-group-text" style="background: var(--surface); border-color: var(--border);">Rp</span>
                <input type="number" class="form-control" th:field="*{productionCost}" required min="0" style="background: white;">
            </div>
            <div class="form-text" style="font-size: 0.75rem;">*Harga jual akhir akan dihitung ulang secara otomatis.</div>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label" style="font-weight: 600; font-size: 0.9rem;">Storytelling / Deskripsi Karya</label>
            <textarea class="form-control" th:field="*{storytelling}" rows="5" required style="background: white;"></textarea>
        </div>

        <div class="d-flex gap-3 mt-5">
            <a th:href="@{/dashboard}" class="btn btn-outline btn-lg" style="flex: 1;">Batal</a>
            <button type="submit" class="btn btn-primary btn-lg" style="flex: 2;">Simpan Perubahan</button>
        </div>

        </form>
    </div>

    </div>

    <footer>
    <div class="container text-center py-4">
        <div style="font-size:0.8rem;color:var(--text-muted)">© 2026 Artopia. All rights reserved.</div>
    </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
    </body>
</html>
