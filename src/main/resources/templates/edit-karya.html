<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Edit Karya</title></head>
<body>
    <h1>Edit Karya Seni</h1>
    
    <form th:action="@{/edit/{id}(id=${karyaEdit.id})}" th:object="${karyaEdit}" method="post">
        
        <label>Judul Karya:</label>
        <input type="text" th:field="*{title}" required /><br><br>
        
        <label>Kategori:</label>
        <input type="text" th:field="*{category}" /><br><br>
        
        <h3>Update Variabel Harga:</h3>
        
        <label>Biaya Produksi (Rp):</label>
        <input type="number" th:field="*{productionCost}" required /><br><br>
        
        <label>Waktu Pengerjaan (Jam):</label>
        <input type="number" th:field="*{workHours}" required /><br><br>
        
        <label>Tingkat Kesulitan:</label>
        <select th:field="*{difficulty}">
            <option value="Mudah">Mudah</option>
            <option value="Sedang">Sedang</option>
            <option value="Sulit">Sulit</option>
        </select><br><br>
        
        <button type="submit">Simpan Perubahan</button>
    </form>
</body>
</html>
