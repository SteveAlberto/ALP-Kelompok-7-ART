<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Profil Seniman</title></head>
<body>
    <h1>Profil Seniman</h1>
    <a href="/katalog">Kembali ke Katalog</a> | <a href="/logout">Logout</a>
    <hr>

    <h2>Biodata</h2>
    <p><strong>Username:</strong> <span th:text="${user.username}">Nama</span></p>
    <p><strong>Role:</strong> <span th:text="${user.role}">Role</span></p>

    <hr>

    <h2>Tambah Riwayat Pameran / Penghargaan</h2>
    <form th:action="@{/profil/tambah-riwayat}" method="post">
        <label>Tahun:</label>
        <input type="number" name="year" placeholder="Contoh: 2025" required /><br><br>
        
        <label>Deskripsi Pencapaian:</label><br>
        <textarea name="description" rows="3" cols="40" placeholder="Contoh: Juara 1 Lomba Melukis Nasional UC" required></textarea><br><br>
        
        <button type="submit">Tambah ke Profil</button>
    </form>

    <hr>

    <h2>Riwayat Penyelenggaraan & Penghargaan</h2>
    <div th:if="${#lists.isEmpty(daftarRiwayat)}">
        <p>Belum ada riwayat yang dicatat.</p>
    </div>
    
    <ul>
        <li th:each="riwayat : ${daftarRiwayat}">
            <strong th:text="${riwayat.year}">2026</strong> - <span th:text="${riwayat.description}">Deskripsi</span>
        </li>
    </ul>
</body>
</html>
