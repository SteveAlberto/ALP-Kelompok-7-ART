<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artopia · Inbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Instrument+Sans:wght@300;400;500;600" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    .chat-list-item {
        display: flex; align-items: center; gap: 12px; padding: 1rem;
        border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s;
    }
    .chat-list-item:hover, .chat-list-item.active { background: rgba(245,242,236,0.5); }
    .chat-list-name { font-weight: 600; color: var(--navy); font-size: 0.95rem; }
    .chat-list-preview { font-size: 0.8rem; color: var(--text-muted); }
    .avatar-circle {
        background: var(--accent); color: white; width: 40px; height: 40px;
        border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600;
    }
  </style>
</head>
<body>

<div id="toast-container" class="toast-container"></div>

<nav class="navbar">
  <a class="navbar-brand" th:href="@{/}">Artopia<span class="brand-dot"></span></a>
  <ul class="nav-links">
    <li><a th:href="@{/}">Home</a></li>
    <li><a th:href="@{/katalog}">Katalog</a></li>
    <li><a th:href="@{/dashboard}">Dashboard</a></li>
    <li><a th:href="@{/inbox}" class="active">Inbox</a></li>
  </ul>
  <div class="navbar-search">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Cari karya, seniman...">
  </div>
  <div class="navbar-actions">
    <a th:href="@{/cart}" class="btn btn-ghost btn-sm cart-icon-wrap" title="Keranjang">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span id="cart-badge"></span>
    </a>
    
    <div class="profile-dropdown" th:if="${session.loggedInUser != null}">
      <div class="artist-avatar" style="background:var(--accent);color:white;font-weight:700;cursor:pointer;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.85rem;" onclick="toggleDropdown()" th:text="${#strings.substring(session.loggedInUser.username,0,1)}">A</div>
      <div class="profile-dropdown-menu" id="profile-menu">
        <a th:href="@{/dashboard}"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Dashboard</a>
        <a th:href="@{/upload}"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Upload Karya</a>
        <div class="divider"></div>
        <button onclick="window.location='/logout'"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Keluar</button>
      </div>
    </div>
  </div>
</nav>

<div class="chat-layout">
  <aside class="chat-sidebar">
    <div class="chat-header">
      <h3>Messages</h3>
      <button class="btn btn-ghost btn-sm" title="Compose">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>
    <div class="chat-search">
      <input type="text" placeholder="Search artists..." oninput="filterChats(this.value)">
    </div>
    
    <div class="chat-list" id="chat-list">
      <div class="chat-list-item active">
        <div class="avatar-circle">S</div>
        <div class="chat-list-info">
          <div class="chat-list-name">Seniman (ID: 2)</div>
          <div class="chat-list-preview">Sedang online...</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="chat-main">
    
    <div id="chat-main-header" class="chat-main-header" style="display: flex; align-items: center; gap: 12px; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: white;">
        <div class="avatar-circle" style="width: 35px; height: 35px; font-size: 0.9rem;">S</div>
        <h4 style="margin: 0; font-size: 1.1rem; color: var(--navy);">Seniman (ID: 2)</h4>
    </div>
    
    <div class="chat-messages" id="chat-messages" style="padding: 1.5rem; display: flex; flex-direction: column;">
      </div>
    
    <div class="chat-input-wrap">
      <button class="btn btn-ghost btn-sm" title="Attach image">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
      <textarea class="chat-input" id="msg-input" placeholder="Ketik pesan di sini..." rows="1" style="resize: none;"></textarea>
      
      <button class="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
    document.getElementById("msg-input").addEventListener("keypress", function(event) {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    });
</script>
</body>
</html>
