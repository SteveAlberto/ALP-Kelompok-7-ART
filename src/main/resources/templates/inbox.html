<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artopia · Inbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Instrument+Sans:wght@300;400;500;600" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="toast-container" class="toast-container"></div>

<nav class="navbar">
  <a class="navbar-brand" href="index.html">Artopia<span class="brand-dot"></span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="catalog.html">Katalog</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="inbox.html" class="active">Inbox</a></li>
  </ul>
  <div class="navbar-search">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Cari karya, seniman...">
  </div>
  <div class="navbar-actions">
    <div class="artist-avatar" style="background:var(--accent);color:white;font-weight:700;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;">A</div>
    <button class="btn btn-outline btn-sm" onclick="window.location='index.html'">Keluar</button>
  </div>
</nav>

<div class="chat-layout">
  <!-- Sidebar -->
  <aside class="chat-sidebar">
    <div class="chat-header">
      <h3>Messages</h3>
      <button class="btn btn-ghost btn-sm" title="Compose">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>
    <div class="chat-search">
      <input type="text" placeholder="Search artists..." oninput="filterChats(this.value)">
    </div>
    <div class="chat-list" id="chat-list">
      <!-- rendered by JS -->
    </div>
  </aside>

  <!-- Chat main -->
  <div class="chat-main">
    <div id="chat-main-header" class="chat-main-header">
      <!-- rendered by JS -->
    </div>
    <div class="chat-messages" id="chat-messages">
      <!-- rendered by JS -->
    </div>
    <div class="chat-input-wrap">
      <button class="btn btn-ghost btn-sm" title="Attach image">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
      <textarea class="chat-input" id="msg-input" placeholder="Type a message..." rows="1"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
