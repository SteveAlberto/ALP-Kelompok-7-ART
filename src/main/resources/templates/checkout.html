<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artopia · Checkout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}">Artopia<span class="brand-dot"></span></a>
    <ul class="nav-links">
        <li><a th:href="@{/}">Home</a></li>
        <li><a th:href="@{/katalog}">Katalog</a></li>
        <li><a th:href="@{/dashboard}">Dashboard</a></li>
    </ul>
</nav>

<div class="container flex-center" style="min-height: 80vh; padding: 3rem 0; display: flex; justify-content: center; align-items: flex-start;">
    
    <div class="panel" style="width: 100%; max-width: 550px; padding: 2.5rem;">
        
        <div class="text-center mb-4">
            <h1 style="color: var(--navy); margin-bottom: 0.5rem; font-size: 2.2rem;">Checkout</h1>
            <p class="text-muted">Lengkapi detail pengiriman Anda</p>
        </div>

        <div style="background: rgba(245,242,236,0.3); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 2rem;">
            <h6 style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem;">Ringkasan Pesanan</h6>
            <div class="d-flex justify-content-between align-items-center mb-1">
                <span style="font-weight: 600; font-size: 1.1rem; color: var(--navy);" th:text="${artwork.title}">Judul Karya</span>
                <span style="font-weight: 600; color: var(--navy);" th:text="'Rp ' + ${#numbers.formatDecimal(artwork.finalPrice, 0, 'POINT', 0, 'COMMA')}">Rp 0</span>
            </div>
            <div style="font-size: 0.85rem; color: var(--text-muted);" th:text="'oleh ' + ${artwork.artist?.username ?: 'Seniman Anonim'}">oleh Seniman</div>
        </div>

        <form th:action="@{/checkout/process/{id}(id=${artwork.id})}" method="post">
            <h6 style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem;">Informasi Pengiriman</h6>
            
            <div class="form-group mb-3">
                <label class="form-label">Alamat Lengkap</label>
                <textarea name="shippingAddress" class="form-control" rows="3" placeholder="Nama jalan, nomor rumah, RT/RW, kelurahan, kecamatan" required autofocus></textarea>
            </div>
            
            <div class="row">
                <div class="col-md-6 form-group mb-3">
                    <label class="form-label">Kota / Kabupaten</label>
                    <input type="text" name="city" class="form-control" placeholder="Contoh: Makassar" required>
                </div>
                <div class="col-md-6 form-group mb-3">
                    <label class="form-label">Kode Pos</label>
                    <input type="text" name="zipCode" class="form-control" placeholder="Contoh: 90245" required>
                </div>
            </div>
            
            <div class="form-group mb-4">
                <label class="form-label">Nomor Handphone (WhatsApp)</label>
                <input type="tel" name="phoneNumber" class="form-control" placeholder="Contoh: 081234567890" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full mt-2" style="padding: 0.8rem; font-size: 1rem;">Bayar Sekarang</button>
            
            <div class="text-center mt-3">
                <a th:href="@{/katalog}" style="font-size: 0.85rem; color: var(--text-muted); text-decoration: underline;">Batal & Kembali ke Katalog</a>
            </div>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
