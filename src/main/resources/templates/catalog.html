<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artopia · Katalog Karya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="toast-container" class="toast-container"></div>

<nav class="navbar">
  <a class="navbar-brand" href="index.html">Artopia<span class="brand-dot"></span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="catalog.html" class="active">Katalog</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="inbox.html">Inbox</a></li>
  </ul>
  <div class="navbar-search">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="nav-search" placeholder="Cari karya, seniman..." oninput="filterCards()">
  </div>
  <div class="navbar-actions">
    <a href="cart.html" class="btn btn-ghost btn-sm cart-icon-wrap">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span id="cart-badge"></span>
    </a>
    <div class="profile-dropdown">
      <div class="artist-avatar" style="background:var(--accent);color:white;font-weight:700;cursor:pointer;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.85rem;" onclick="toggleDropdown()">A</div>
      <div class="profile-dropdown-menu" id="profile-menu">
        <a href="dashboard.html"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Dashboard</a>
        <a href="upload.html"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Upload Karya</a>
        <div class="divider"></div>
        <button onclick="window.location='index.html'"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Keluar</button>
      </div>
    </div>
  </div>
</nav>

<div class="container" style="padding-top:2rem;padding-bottom:4rem">
  <div class="page-header">
    <h1 style="font-size:1.9rem">Katalog Karya</h1>
    <p class="text-muted" id="catalog-count">Menampilkan 9 karya</p>
  </div>

  <div class="catalog-layout">
    <aside class="sidebar">
      <div class="filter-section">
        <div class="filter-title">Kategori</div>
        <label class="filter-option"><input type="checkbox" class="cat-filter" value="lukisan" onchange="filterCards()"> Lukisan</label>
        <label class="filter-option"><input type="checkbox" class="cat-filter" value="digital" onchange="filterCards()"> Digital Art</label>
        <label class="filter-option"><input type="checkbox" class="cat-filter" value="patung" onchange="filterCards()"> Patung</label>
      </div>
      <div class="filter-section">
        <div class="filter-title">Harga Maks</div>
        <div class="price-range-wrap">
          <input type="range" id="price-range" min="0" max="50000000" step="500000" value="50000000" oninput="updatePriceLabel(); filterCards()">
          <div class="price-labels"><span>Rp 0</span><span id="price-max-label">Rp 50.000.000+</span></div>
        </div>
      </div>
      <div class="filter-section">
        <div class="filter-title">Status</div>
        <label class="filter-option"><input type="radio" name="avail" value="all" checked onchange="filterCards()"> Semua</label>
        <label class="filter-option"><input type="radio" name="avail" value="available" onchange="filterCards()"> Tersedia</label>
        <label class="filter-option"><input type="radio" name="avail" value="sold" onchange="filterCards()"> Terjual</label>
      </div>
      <button class="btn btn-outline btn-full btn-sm" onclick="resetFilters()">Reset Filter</button>
    </aside>

    <main>
      <div class="catalog-toolbar">
        <div style="position:relative">
          <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted)" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="catalog-search" placeholder="Cari karya..." oninput="filterCards()" style="padding:0.38rem 0.75rem 0.38rem 2rem;border:1.5px solid var(--border);border-radius:var(--radius);font-size:0.84rem;outline:none;background:var(--surface);width:220px">
        </div>
        <div class="flex items-center gap-2">
          <span style="font-size:0.82rem;color:var(--text-muted)">Urutkan:</span>
          <select class="sort-select" id="sort-select" onchange="filterCards()">
            <option value="newest">Terbaru</option>
            <option value="price-asc">Harga ↑</option>
            <option value="price-desc">Harga ↓</option>
          </select>
        </div>
      </div>
      <div class="catalog-grid" id="catalog-grid"></div>
    </main>
  </div>
</div>

<footer>
  <div class="container">
    <div class="flex-between flex-wrap gap-3">
      <div>
        <div class="footer-brand">Artopia<span style="display:inline-block;width:6px;height:6px;background:var(--tan);border-radius:50%;margin-left:3px;vertical-align:middle;margin-bottom:3px"></span></div>
        <div style="font-size:0.78rem;color:rgba(245,242,236,0.25);margin-top:0.4rem">© 2026 Artopia. All rights reserved.</div>
      </div>
      <div class="flex gap-3" style="font-size:0.82rem">
        <a href="#" style="color:rgba(245,242,236,0.45)">Privacy</a>
        <a href="#" style="color:rgba(245,242,236,0.45)">Terms</a>
        <a href="#" style="color:rgba(245,242,236,0.45)">Help</a>
      </div>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
